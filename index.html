const sendReportWA = async () => {

let msg = `📊 *تقرير أسبوعي - كشمير للخياطة*\n📅 ${weekAgo.toLocaleDateString('ar-KW')} → ${now.toLocaleDateString('ar-KW')}\n\n`;
msg += `🔢 عدد الطلبات: ${weekOrds.length}\n💰 الإيرادات: ${weekRev.toFixed(3)} KD\n💸 المبالغ المتبقية: ${debt.toFixed(3)} KD\n`;
msg += `⏳ شغالة: ${orders.filter(o => o.status === 'شغال').length} | ✅ جاهزة: ${orders.filter(o => o.status === 'جاهز').length}`;
const encoded = encodeURIComponent(msg);
REPORT_NUMBERS.forEach((num, i) => setTimeout(() => window.open(`https://wa.me/${num}?text=${encoded}`, ‘_blank’), i * 800));
showToast(‘✅ يتم إرسال التقرير للملاك’);

            <FG label="طريقة الدفع"><select style={S.inp} value={order.payMethod} onChange={e => setOrder(o => ({ ...o, payMethod: e.target.value }))}><option>نقدي</option><option>كنت (KNET)</option><option>تحويل</option></select></FG>
          </div>
          <TotalsBox tailoring={tailoring} textiles={textiles} others={others} discount={order.discount} paid={paid} total={total} remaining={remaining} />
          <FG label="ملاحظات"><textarea style={{ ...S.inp, minHeight: 56, resize: 'vertical' }} value={order.remarks} onChange={e => setOrder(o => ({ ...o, remarks: e.target.value }))} /></FG>
        </div>
        <button onClick={saveOrder} style={{ ...btn(GOLD), width: '100%', justifyContent: 'center', fontSize: 16, padding: 14 }}>💾 حفظ الطلب</button>
      </div>
    )}

    {/* ORDERS */}
    {page === 'orders' && (
      <div>
        <div style={S.secTitle}>📋 الطلبات</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <select style={{ ...S.inp, flex: 1 }} value={ordFilter} onChange={e => setOrdFilter(e.target.value)}>
            <option value="">كل الطلبات</option><option>شغال</option><option>جاهز</option><option>سلّم</option>
          </select>
          <input style={{ ...S.inp, flex: 1 }} placeholder="ابحث..." value={ordSearch} onChange={e => setOrdSearch(e.target.value)} />
        </div>
        {filteredOrders.length === 0 ? <div style={{ textAlign: 'center', padding: 30, color: '#aaa' }}>ما في طلبات</div> :
          filteredOrders.map(o => <OrderCard key={o.id} o={o} role={role} onView={() => setViewOrd(o)} onWA={() => sendWA(o)} onStatus={s => updateStatus(o.id, s)} onDelete={() => deleteOrder(o.id)} />)}
      </div>
    )}

    {/* CUSTOMERS */}
    {page === 'customers' && (
      <div>
        <div style={S.secTitle}>👥 الزبائن
          <button onClick={() => { setCustForm({ name: '', phone: '', address: '', notes: '' }); setEditCust({}); }} style={btn(GOLD)}>+ زبون جديد</button>
        </div>
        <input style={{ ...S.inp, marginBottom: 12 }} placeholder="ابحث باسم أو رقم..." value={custSearch} onChange={e => setCustSearch(e.target.value)} />
        {filteredCusts.length === 0 ? <div style={{ textAlign: 'center', padding: 30, color: '#aaa' }}>ما في زبائن</div> :
          filteredCusts.map(c => {
            const ords = orders.filter(o => o.phone === c.phone);
            const debt = ords.reduce((s, o) => s + (o.remaining || 0), 0);
            return (
              <div key={c.id} onClick={() => setViewCust(c)} style={{ ...S.card, display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}>
                <div><div style={{ fontWeight: 900, fontSize: 15, color: BROWN }}>{c.name}</div><div style={{ fontSize: 12, color: '#777', marginTop: 3 }}>📞 {c.phone} | {ords.length} طلب</div></div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 5 }}>
                  <span style={{ padding: '3px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: debt > 0 ? '#fde2e2' : '#d4edda', color: debt > 0 ? RED : GREEN }}>{debt > 0 ? debt.toFixed(3) + ' KD' : 'مسوّى'}</span>
                  <span style={{ color: '#ccc', fontSize: 20 }}>›</span>
                </div>
              </div>
            );
          })}
      </div>
    )}

    {/* REPORTS - OWNER ONLY */}
    {page === 'reports' && (
      <div>
        {role !== 'owner' ? <div style={{ textAlign: 'center', padding: 40, color: '#aaa' }}>🔒 التقارير للمالك فقط</div> : (
          <>
            <div style={S.secTitle}>📈 التقرير الأسبوعي</div>
            <div style={S.card}>
              {[['عدد طلبات الأسبوع', weekOrds.length], ['إيرادات الأسبوع', weekRev.toFixed(3) + ' KD'], ['طلبات شغالة', pendingCount], ['طلبات جاهزة', orders.filter(o => o.status === 'جاهز').length], ['مبالغ متبقية', totalDebt.toFixed(3) + ' KD']].map(([l, v]) => (
                <div key={l} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${GOLD_PALE}` }}>
                  <span>{l}</span><span style={{ fontWeight: 900, color: GOLD }}>{v}</span>
                </div>
              ))}
            </div>
            <button onClick={sendReportWA} style={{ background: '#25d366', color: WHITE, border: 'none', borderRadius: 10, padding: '11px 16px', fontFamily: 'Tajawal,sans-serif', fontSize: 14, fontWeight: 700, cursor: 'pointer', width: '100%', marginBottom: 16 }}>📲 إرسال التقرير للملاك</button>
            <div style={S.secTitle}>💸 المبالغ المتبقية</div>
            {orders.filter(o => (o.remaining || 0) > 0).sort((a, b) => b.remaining - a.remaining).map(o => (
              <div key={o.id} style={{ ...S.card, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div><div style={{ fontWeight: 900 }}>{o.name} - #{o.serial}</div><div style={{ fontSize: 12, color: '#777' }}>{o.phone}</div></div>
                <div style={{ textAlign: 'left' }}>
                  <div style={{ fontWeight: 900, fontSize: 16, color: RED }}>{o.remaining.toFixed(3)} KD</div>
                  <button onClick={() => sendWA(o)} style={{ background: '#25d366', color: WHITE, border: 'none', borderRadius: 8, padding: '5px 10px', fontFamily: 'Tajawal,sans-serif', fontSize: 12, cursor: 'pointer', marginTop: 4 }}>📲</button>
                </div>
              </div>
            ))}
            {orders.filter(o => (o.remaining || 0) > 0).length === 0 && <div style={{ textAlign: 'center', padding: 20, color: GREEN, fontWeight: 700 }}>✅ ما في مبالغ متبقية!</div>}
          </>
        )}
      </div>
    )}

    {/* SETTINGS */}
    {page === 'settings' && (
      <div>
        <div style={S.secTitle}>⚙️ الإعدادات</div>
        <div style={S.card}>
          <div style={S.cardTitle}>ℹ️ معلومات السستم</div>
          <div style={{ fontSize: 13, color: '#777', lineHeight: 1.9 }}>
            <div>👑 رمز المالك: <b>1973</b></div>
            <div>🪡 رمز الخياط: <b>1234</b></div>
            <div>📱 أرقام التقارير: 60601605 | 60948048 | 50519551</div>
            <div style={{ marginTop: 8, color: RED, fontSize: 12 }}>⚠️ لتغيير الأرقام والرموز تواصل مع المطور</div>
          </div>
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>📊 إحصائيات</div>
          <div style={{ fontSize: 13, color: '#777', lineHeight: 2 }}>
            <div>عدد الزبائن: <b>{customers.length}</b></div>
            <div>إجمالي الطلبات: <b>{orders.length}</b></div>
            <div>طلبات شغالة: <b>{pendingCount}</b></div>
            {role === 'owner' && <div>مبالغ متبقية: <b style={{ color: RED }}>{totalDebt.toFixed(3)} KD</b></div>}
          </div>
        </div>
      </div>
    )}

  </div>

  {/* BOTTOM NAV */}
  <div style={S.bottomNav}>
    <BNavItem icon="🏠" label="الرئيسية" active={page === 'home'} onClick={() => setPage('home')} />
    <BNavItem icon="➕" label="طلب جديد" active={page === 'order'} onClick={() => setPage('order')} />
    <BNavItem icon="📋" label="الطلبات" active={page === 'orders'} onClick={() => setPage('orders')} />
    <BNavItem icon="👥" label="الزبائن" active={page === 'customers'} onClick={() => setPage('customers')} />
    {role === 'owner' && <BNavItem icon="📈" label="التقارير" active={page === 'reports'} onClick={() => setPage('reports')} />}
    <BNavItem icon="⚙️" label="الإعدادات" active={page === 'settings'} onClick={() => setPage('settings')} />
  </div>
</div>
```

);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App />);
</script>

</body>
</html>
